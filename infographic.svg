<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" width="1120" height="360" font-family="system-ui, -apple-system, sans-serif">

  <!-- Fundo -->
  <rect width="1120" height="360" rx="16" fill="#f8fafc"/>

  <!-- Título -->
  <text x="560" y="44" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">
    Leitor de QR Code Fiscal ATCUD — Fluxo de Processamento
  </text>
  <text x="560" y="64" text-anchor="middle" font-size="12" fill="#64748b">
    PDF ou Imagem → Detecção de QR codes → Validação ATCUD → JSON estruturado · Enriquecimento NIF opcional
  </text>

  <!-- ── Passo 1: Upload ─────────────────────────────────────── -->
  <rect x="20" y="90" width="148" height="180" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Ícone PDF -->
  <rect x="38" y="108" width="38" height="48" rx="3" fill="#fff" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="38" y="108" width="38" height="14" rx="3" fill="#0284c7"/>
  <text x="57" y="119" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">PDF</text>
  <line x1="44" y1="133" x2="70" y2="133" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="44" y1="141" x2="70" y2="141" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="44" y1="149" x2="62" y2="149" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Ícone imagem -->
  <rect x="86" y="112" width="38" height="38" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="94" cy="121" r="4" fill="#86efac"/>
  <path d="M86 140 l10-10 9 9 8-5 11 9" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <!-- Texto -->
  <text x="94" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Upload</text>
  <text x="94" y="192" text-anchor="middle" font-size="10" fill="#64748b">PDF ou Imagem</text>
  <text x="94" y="206" text-anchor="middle" font-size="10" fill="#64748b">JPEG · PNG · GIF</text>
  <text x="94" y="220" text-anchor="middle" font-size="10" fill="#64748b">WEBP · TIFF</text>

  <!-- Seta 1→2 -->
  <path d="M170 180 L192 180" stroke="#94a3b8" stroke-width="2" marker-end="url(#seta)"/>

  <!-- ── Passo 2: Renderização (PDF only) ───────────────────── -->
  <rect x="194" y="90" width="148" height="180" rx="12" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <!-- Ícone imagem renderizada -->
  <rect x="224" y="108" width="88" height="54" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="239" cy="122" r="6" fill="#86efac"/>
  <path d="M224 146 l18-16 14 13 14-9 28 12" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <!-- Badge pdftoppm -->
  <rect x="234" y="156" width="68" height="15" rx="4" fill="#16a34a"/>
  <text x="268" y="167" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">pdftoppm</text>
  <!-- Nota imagem -->
  <rect x="224" y="176" width="88" height="14" rx="3" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="268" y="186" text-anchor="middle" font-size="8" fill="#854d0e">imagem: passo omitido</text>
  <!-- Texto -->
  <text x="268" y="204" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Renderização</text>
  <text x="268" y="219" text-anchor="middle" font-size="10" fill="#64748b">PDF → PNG 200 DPI</text>

  <!-- Seta 2→3 -->
  <path d="M344 180 L366 180" stroke="#94a3b8" stroke-width="2" marker-end="url(#seta)"/>

  <!-- ── Passo 3: Detecção QR ────────────────────────────────── -->
  <rect x="368" y="90" width="148" height="180" rx="12" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
  <!-- Ícone QR -->
  <rect x="408" y="106" width="52" height="52" rx="4" fill="#fff" stroke="#9333ea" stroke-width="1.5"/>
  <rect x="413" y="111" width="15" height="15" rx="2" fill="#9333ea"/>
  <rect x="432" y="111" width="15" height="15" rx="2" fill="#9333ea"/>
  <rect x="413" y="130" width="15" height="15" rx="2" fill="#9333ea"/>
  <rect x="432" y="130" width="7" height="7" rx="1" fill="#9333ea"/>
  <rect x="441" y="130" width="7" height="7" rx="1" fill="#9333ea"/>
  <rect x="432" y="141" width="15" height="6" rx="1" fill="#9333ea"/>
  <!-- Badge -->
  <rect x="406" y="156" width="56" height="15" rx="4" fill="#9333ea"/>
  <text x="434" y="167" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">gozxing</text>
  <!-- Texto -->
  <text x="442" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">Detecção</text>
  <text x="442" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">de QR Codes</text>
  <text x="442" y="228" text-anchor="middle" font-size="10" fill="#64748b">Todas as páginas</text>

  <!-- Seta 3→4 -->
  <path d="M518 180 L540 180" stroke="#94a3b8" stroke-width="2" marker-end="url(#seta)"/>

  <!-- ── Passo 4: Validação ATCUD ───────────────────────────── -->
  <rect x="542" y="90" width="148" height="180" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Ícone validação -->
  <circle cx="616" cy="138" r="28" fill="#fff" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M603 138 l9 10 18-20" fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Badge -->
  <rect x="584" y="162" width="64" height="15" rx="4" fill="#ea580c"/>
  <text x="616" y="173" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Spec AT</text>
  <!-- Texto -->
  <text x="616" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Validação</text>
  <text x="616" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">ATCUD</text>
  <text x="616" y="228" text-anchor="middle" font-size="10" fill="#64748b">Filtra QR com</text>
  <text x="616" y="241" text-anchor="middle" font-size="10" fill="#64748b">ATCUD válido</text>

  <!-- Seta 4→5 -->
  <path d="M692 180 L714 180" stroke="#94a3b8" stroke-width="2" marker-end="url(#seta)"/>

  <!-- ── Passo 5: JSON ───────────────────────────────────────── -->
  <rect x="716" y="90" width="148" height="180" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Ícone JSON -->
  <rect x="738" y="106" width="104" height="56" rx="4" fill="#1e293b"/>
  <text x="746" y="122" font-size="9" font-family="monospace" fill="#38bdf8">"emitente":</text>
  <text x="754" y="134" font-size="9" font-family="monospace" fill="#4ade80">{ "nif": "500..." }</text>
  <text x="746" y="146" font-size="9" font-family="monospace" fill="#38bdf8">"atcud":</text>
  <text x="754" y="157" font-size="9" font-family="monospace" fill="#facc15">"J66S9FDD-659"</text>
  <!-- Texto -->
  <text x="790" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Resposta</text>
  <text x="790" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">JSON</text>
  <text x="790" y="228" text-anchor="middle" font-size="10" fill="#64748b">NIF · Tipo · ATCUD</text>
  <text x="790" y="241" text-anchor="middle" font-size="10" fill="#64748b">IVA · Totais · ...</text>

  <!-- Seta 5→6 (tracejada — opcional) -->
  <path d="M866 180 L888 180" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#seta)"/>

  <!-- ── Passo 6: NIF Enrichment (opcional) ─────────────────── -->
  <rect x="890" y="90" width="210" height="180" rx="12" fill="#f0fdf4" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Badge opcional -->
  <rect x="948" y="80" width="56" height="16" rx="8" fill="#059669"/>
  <text x="976" y="91" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">opcional</text>
  <!-- Ícone empresa -->
  <rect x="930" y="108" width="70" height="50" rx="4" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <rect x="950" y="120" width="12" height="12" rx="2" fill="#6ee7b7"/>
  <rect x="968" y="120" width="12" height="12" rx="2" fill="#6ee7b7"/>
  <rect x="950" y="137" width="30" height="10" rx="2" fill="#6ee7b7"/>
  <rect x="938" y="148" width="54" height="10" rx="0" fill="#059669"/>
  <!-- Badge IA -->
  <rect x="940" y="160" width="50" height="15" rx="4" fill="#059669"/>
  <text x="965" y="171" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">NIF + IA</text>
  <!-- Código enriquecido -->
  <rect x="994" y="108" width="96" height="50" rx="4" fill="#1e293b"/>
  <text x="1000" y="122" font-size="8" font-family="monospace" fill="#38bdf8">"emitente":</text>
  <text x="1004" y="133" font-size="7" font-family="monospace" fill="#4ade80">"descricao":</text>
  <text x="1004" y="143" font-size="7" font-family="monospace" fill="#facc15">"EDP Comercial"</text>
  <text x="1000" y="154" font-size="8" font-family="monospace" fill="#38bdf8">"nif":"503..."</text>
  <!-- Texto -->
  <text x="995" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Identificação</text>
  <text x="995" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">de Entidades</text>
  <text x="995" y="228" text-anchor="middle" font-size="10" fill="#64748b">Nome emitente</text>
  <text x="995" y="241" text-anchor="middle" font-size="10" fill="#64748b">e adquirente</text>

  <!-- Linha de numeração dos passos -->
  <text x="94"   y="288" text-anchor="middle" font-size="11" fill="#94a3b8">① Upload</text>
  <text x="268"  y="288" text-anchor="middle" font-size="11" fill="#94a3b8">② Render</text>
  <text x="442"  y="288" text-anchor="middle" font-size="11" fill="#94a3b8">③ Scan QR</text>
  <text x="616"  y="288" text-anchor="middle" font-size="11" fill="#94a3b8">④ Validar</text>
  <text x="790"  y="288" text-anchor="middle" font-size="11" fill="#94a3b8">⑤ JSON</text>
  <text x="995"  y="288" text-anchor="middle" font-size="11" fill="#059669">⑥ NIF (IA)</text>

  <!-- Rodapé -->
  <text x="560" y="330" text-anchor="middle" font-size="10" fill="#cbd5e1">
    Leitor de QR Code Fiscal ATCUD v1.2.0 · ricardo.grangeia.pt · Licença MIT
  </text>

  <!-- Marcador de seta -->
  <defs>
    <marker id="seta" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
