stages:
  - deploy

deploy-stack-main:
  stage: deploy
  image: curlimages/curl:latest # Use a lightweight image with curl installed
  script:
    - echo "Triggering Portainer webhook for stack redeployment on the main branch..."
    - |
      curl -X POST "https://docker.orb.appa8.com/api/stacks/webhooks/cdbe8cdc-cffa-48b8-8581-bd77baea0f10s" \
        -H "Content-Type: application/json"

  only:
    - main # Trigger this job only on the live branch

